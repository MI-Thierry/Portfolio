# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Monster ASP Deployment

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: |
          dotnet publish \
            --configuration Release \
            --output ./publish \

    - name: Upload publish artifact
      uses: actions/upload-artifact@v4
      with:
          name: blazor-publish
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-publish
          path: ./publish

      - name: Create app_offline.htm
        run: |
          mkdir -p ./offline
          cat > ./offline/app_offline.htm << 'EOF'
          <!DOCTYPE html>
          <html>
            <head><title>Updating...</title></head>
            <body>
              <h1>Site is being updated, back shortly...</h1>
            </body>
          </html>
          EOF

      - name: Take site offline
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./offline/        # folder containing just app_offline.htm
          server-dir: /wwwroot/
          protocol: ftps
          security: loose
      
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          protocol: ftps
          exclude: |
            **/app_offline.htm
          
      - name: Bring site back online
        run: |
          curl --ssl-no-revoke \
            --ftp-method nocwd \
            --ftp-skip-pasv-ip \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /wwwroot/app_offline.htm" \
            "ftps://${{ secrets.FTP_SERVER }}/"
            --max-time 30 \
            -v
