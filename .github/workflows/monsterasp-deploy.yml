# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Monster ASP Deployment

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: |
          dotnet publish \
            --configuration Release \
            --output ./publish \

    - name: Upload publish artifact
      uses: actions/upload-artifact@v4
      with:
          name: blazor-publish
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-publish
          path: ./publish

      - name: Stop site before deploying (prevent file lock)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://${{ secrets.FTP_SERVER }}/app_offline.htm" || true
          echo "app_offline.htm trick - uploading placeholder"
          echo "Deploying, please wait..." > ./publish/app_offline.htm
      
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /site/wwwroot/
          protocol: ftps
          
      - name: Remove app_offline to bring site back up
        run: rm -f ./publish/app_offline.htm
