# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Monster ASP Deployment

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: |
          dotnet publish `
            --configuration Release `
            --output ./publish `
            --runtime win-x86 `
            --self-contained false `
            -p:ParallelStaticWebAssetsBuild=false `
            -p:BuildInParallel=false

    - name: Deploy via WebDeploy
      uses: rasmusbuchholdt/simply-web-deploy@2.1.0
      with:
        website-name: ${{ secrets.SITE_NAME }}
        server-computer-name: ${{ secrets.SERVER_URL }}
        server-username: ${{ secrets.USERNAME }}
        server-password: ${{ secrets.PASSWORD }}
        source-path: './publish'
